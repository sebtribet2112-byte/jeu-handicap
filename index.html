<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu Handicap Invisible</title>

<style>
body{
  font-family:Arial;
  background:#0b1d2a;
  color:white;
  text-align:center;
  padding:20px;
}

.card{
  background:#162b3a;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
}

.choice{
  display:block;
  width:100%;
  margin:10px 0;
}

.correct{background:green;}
.wrong{background:red;}

#next{
  display:none;
  background:orange;
}
</style>
</head>

<body>

<h1>🧠 Jeu Handicap Invisible</h1>

<div class="card">
  <h2 id="question">Chargement...</h2>

  <div id="choices"></div>

  <button id="next" onclick="nextQuestion()">Suivant</button>
</div>

<script>
const QUESTIONS = [
{
  mission:"Lis ce texte en bégayant",
  choix:["Bégaiement","TDAH","Autisme","Dyslexie"],
  answer:0
},
{
  mission:"Lis très lentement avec pauses",
  choix:["Fatigue chronique","TDAH","Anxiété","Autisme"],
  answer:0
},
{
  mission:"Lis rapidement comme stressé",
  choix:["Anxiété","Dyspraxie","TDAH","Fatigue"],
  answer:0
},
{
  mission:"Change de rythme en parlant",
  choix:["TDAH","Autisme","Dyslexie","Phobie"],
  answer:0
}
];

let current = 0;

function showQuestion(){
  const q = QUESTIONS[current];

  document.getElementById("question").innerText = q.mission;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  q.choix.forEach((choice, index)=>{
    const btn = document.createElement("button");
    btn.innerText = choice;
    btn.className = "choice";

    btn.onclick = () => selectAnswer(index, btn);

    choicesDiv.appendChild(btn);
  });

  document.getElementById("next").style.display = "none";
}

function selectAnswer(index, btn){
  const correct = QUESTIONS[current].answer;

  document.querySelectorAll(".choice").forEach(b => b.disabled = true);

  if(index === correct){
    btn.classList.add("correct");
  } else {
    btn.classList.add("wrong");
  }

  document.getElementById("next").style.display = "block";
}

function nextQuestion(){
  current++;

  if(current >= QUESTIONS.length){
    document.body.innerHTML = "<h1>🎉 Fin du jeu</h1>";
    return;
  }

  showQuestion();
}

showQuestion();
</script>

</body>
</html>
